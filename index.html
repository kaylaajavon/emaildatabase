<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Individual Giving Team Email Database</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #FDF0EC;
    --bg-card: #FFFFFF;
    --primary: #D4856A;
    --primary-dark: #B8654A;
    --primary-light: #F5D5C8;
    --accent: #E8A88C;
    --header-bg: #3D2B24;
    --header-text: #F5D5C8;
    --text: #3D2B24;
    --text-light: #8B6F66;
    --border: #E8D5CE;
    --shadow: 0 2px 12px rgba(61,43,36,0.08);
    --shadow-hover: 0 4px 20px rgba(61,43,36,0.14);
    --radius: 16px;
    --radius-sm: 10px;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ─── Header ─── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--header-bg);
    padding: 0 28px;
    display: flex;
    align-items: center;
    gap: 20px;
    height: 66px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.18);
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .panda-icon {
    width: 42px;
    height: 42px;
    position: relative;
  }

  .header-title {
    font-size: 14px;
    font-weight: 800;
    color: var(--header-text);
    letter-spacing: 0.2px;
    line-height: 1.25;
  }

  .header-tabs {
    display: flex;
    gap: 4px;
    margin-left: auto;
  }

  .tab-btn {
    background: transparent;
    border: none;
    color: rgba(245,213,200,0.5);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 8px 22px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn:hover { color: var(--header-text); background: rgba(245,213,200,0.08); }

  .tab-btn.active {
    color: var(--header-bg);
    background: var(--header-text);
  }

  /* ─── Layout ─── */
  .app-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 24px 60px;
  }

  .view { display: none; }
  .view.active { display: block; }

  /* ─── Encouragement Banner ─── */
  .encouragement-banner {
    text-align: center;
    padding: 10px 16px;
    background: linear-gradient(135deg, var(--primary-light), #FDE8E0);
    border-radius: var(--radius);
    margin-bottom: 20px;
    font-size: 14px;
    font-weight: 700;
    color: var(--primary-dark);
    border: 2px solid rgba(212,133,106,0.15);
  }

  /* ─── Library Layout ─── */
  .library-layout {
    display: grid;
    grid-template-columns: 1fr 250px;
    gap: 28px;
    align-items: start;
  }

  /* ─── Search & Filter Row ─── */
  .search-wrap {
    position: relative;
    margin-bottom: 14px;
  }

  .search-wrap svg {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    color: var(--text-light);
  }

  .search-input {
    width: 100%;
    padding: 12px 16px 12px 46px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    background: var(--bg-card);
    color: var(--text);
    transition: border-color 0.2s;
    outline: none;
  }

  .search-input:focus { border-color: var(--primary); }
  .search-input::placeholder { color: #C2A89E; }

  /* ─── Advanced Filters Row ─── */
  .filters-row {
    display: flex;
    gap: 12px;
    margin-bottom: 16px;
    flex-wrap: wrap;
    align-items: center;
  }

  .filter-select {
    padding: 8px 14px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    background: var(--bg-card);
    outline: none;
    cursor: pointer;
    transition: border-color 0.2s;
    min-width: 150px;
  }

  .filter-select:focus { border-color: var(--primary); }

  .filter-select.active-filter {
    border-color: var(--primary);
    background: var(--primary-light);
    color: var(--primary-dark);
  }

  .clear-filters-btn {
    background: none;
    border: none;
    color: var(--primary);
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    padding: 8px 12px;
    border-radius: var(--radius-sm);
    transition: background 0.2s;
  }

  .clear-filters-btn:hover { background: var(--primary-light); }

  /* ─── Filter Chips ─── */
  .filter-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    border: 2px solid var(--border);
    background: var(--bg-card);
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
  }

  .chip:hover { border-color: var(--primary); }

  .chip.active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }

  .chip-count {
    background: rgba(61,43,36,0.08);
    color: var(--text-light);
    font-size: 11px;
    font-weight: 800;
    padding: 1px 7px;
    border-radius: 10px;
    min-width: 20px;
    text-align: center;
  }

  .chip.active .chip-count {
    background: rgba(255,255,255,0.25);
    color: #fff;
  }

  /* ─── Email Cards ─── */
  .emails-grid {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .email-card {
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 22px 24px;
    box-shadow: var(--shadow);
    transition: box-shadow 0.25s, border-color 0.25s;
    border: 2px solid transparent;
  }

  .email-card:hover {
    box-shadow: var(--shadow-hover);
    border-color: var(--primary-light);
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 4px;
  }

  .card-title {
    font-size: 17px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.3;
  }

  .card-badge {
    display: inline-block;
    padding: 3px 12px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 800;
    color: #fff;
    white-space: nowrap;
    flex-shrink: 0;
    letter-spacing: 0.3px;
  }

  .card-subject {
    font-size: 13px;
    color: var(--text);
    font-weight: 700;
    margin-bottom: 4px;
  }

  .card-subject span {
    font-weight: 600;
    color: var(--text-light);
  }

  .card-author {
    font-size: 13px;
    color: var(--text-light);
    font-weight: 600;
    margin-bottom: 10px;
    font-style: italic;
  }

  .card-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .card-text.collapsed {
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .show-more-btn {
    background: none;
    border: none;
    color: var(--primary);
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    padding: 4px 0;
    margin-top: 2px;
  }

  .show-more-btn:hover { text-decoration: underline; }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1.5px solid #F2E6E0;
  }

  .card-date {
    font-size: 12px;
    color: var(--text-light);
    font-weight: 600;
  }

  .card-actions { display: flex; gap: 6px; }

  .action-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 14px;
    border-radius: var(--radius-sm);
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 700;
    border: 1.5px solid var(--border);
    background: var(--bg-card);
    color: var(--text-light);
    cursor: pointer;
    transition: all 0.2s;
  }

  .action-btn:hover { border-color: var(--primary); color: var(--primary); }

  .action-btn.delete:hover {
    border-color: #D46A6A;
    color: #D46A6A;
    background: #FFF0F0;
  }

  .action-btn svg { width: 14px; height: 14px; }

  .action-btn.copied {
    border-color: #7CB884;
    color: #5A9A64;
    background: #F0F8EE;
  }

  /* ─── Sidebar ─── */
  .sidebar { position: sticky; top: 94px; }

  .sidebar-card {
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 22px;
    box-shadow: var(--shadow);
    margin-bottom: 16px;
  }

  .sidebar-title {
    font-size: 13px;
    font-weight: 800;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .sidebar-title svg { width: 15px; height: 15px; color: var(--primary); }

  .cat-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .cat-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
    color: var(--text);
  }

  .cat-item:hover { background: var(--primary-light); }
  .cat-item.active { background: var(--primary-light); color: var(--primary-dark); }

  .cat-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .cat-count-side {
    margin-left: auto;
    font-size: 11px;
    font-weight: 800;
    color: var(--text-light);
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 10px;
  }

  /* ─── Sidebar Motivational ─── */
  .sidebar-motivation {
    background: linear-gradient(135deg, #FDE8E0, var(--primary-light));
    border-radius: var(--radius);
    padding: 20px;
    text-align: center;
    box-shadow: var(--shadow);
  }

  .sidebar-motivation .panda-icon { width: 48px; height: 48px; margin: 0 auto 8px; }

  .sidebar-motivation p {
    font-size: 13px;
    font-weight: 700;
    color: var(--primary-dark);
    line-height: 1.4;
  }

  /* ─── Add Email View ─── */
  .add-email-layout {
    max-width: 660px;
    margin: 0 auto;
  }

  .form-card {
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 36px 36px 32px;
    box-shadow: var(--shadow);
  }

  .form-hero {
    text-align: center;
    margin-bottom: 6px;
  }

  .form-hero .panda-icon { width: 80px; height: 80px; margin: 0 auto; }

  .form-title {
    font-size: 24px;
    font-weight: 900;
    text-align: center;
    margin-bottom: 2px;
  }

  .form-subtitle {
    font-size: 14px;
    color: var(--text-light);
    text-align: center;
    margin-bottom: 28px;
  }

  .form-group { margin-bottom: 18px; }

  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 800;
    margin-bottom: 6px;
    color: var(--text);
  }

  .form-label .req { color: var(--primary); }

  .form-input, .form-select {
    width: 100%;
    padding: 11px 14px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: #fff;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus, .form-select:focus { border-color: var(--primary); }
  .form-input::placeholder { color: #C2A89E; }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .cat-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .cat-row .form-group { flex: 1; margin-bottom: 0; }

  .new-cat-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 11px 16px;
    border-radius: var(--radius-sm);
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    border: 2px dashed var(--primary);
    background: transparent;
    color: var(--primary);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .new-cat-btn:hover { background: var(--primary-light); }

  .new-cat-inline {
    display: none;
    gap: 8px;
    align-items: center;
    margin-top: 10px;
  }

  .new-cat-inline.show { display: flex; }
  .new-cat-inline .form-input { flex: 1; }

  .inline-btn {
    padding: 11px 18px;
    border-radius: var(--radius-sm);
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .inline-btn.confirm { background: var(--primary); color: #fff; }
  .inline-btn.confirm:hover { background: var(--primary-dark); }

  .inline-btn.cancel {
    background: var(--bg-card);
    color: var(--text-light);
    border: 2px solid var(--border);
  }

  .inline-btn.cancel:hover { border-color: var(--text-light); }

  /* ─── Drop Zone ─── */
  .dropzone {
    position: relative;
    border: 2px dashed var(--border);
    border-radius: var(--radius-sm);
    min-height: 200px;
    transition: all 0.2s;
    background: #FDFAF9;
  }

  .dropzone.drag-over {
    border-color: var(--primary);
    background: var(--primary-light);
  }

  .dropzone-textarea {
    width: 100%;
    min-height: 200px;
    padding: 16px;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    line-height: 1.65;
    color: var(--text);
    background: transparent;
    resize: vertical;
    outline: none;
  }

  .dropzone-hint {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    color: #C2A89E;
    font-size: 13px;
    font-weight: 600;
    transition: opacity 0.2s;
  }

  .dropzone-hint svg {
    display: block;
    margin: 0 auto 8px;
    width: 36px;
    height: 36px;
    color: var(--accent);
  }

  .dropzone-hint.hidden { opacity: 0; }

  .submit-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: var(--radius);
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 800;
    background: var(--primary);
    color: #fff;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 10px;
  }

  .submit-btn:hover { background: var(--primary-dark); }
  .submit-btn:active { transform: scale(0.99); }

  /* ─── Empty State ─── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-light);
  }

  .empty-state svg { width: 56px; height: 56px; margin-bottom: 14px; color: var(--accent); }
  .empty-state p { font-size: 15px; font-weight: 600; }
  .empty-state .encourage { font-size: 13px; color: var(--primary); margin-top: 6px; }

  /* ─── Loading Spinner ─── */
  .loading-state {
    text-align: center;
    padding: 50px 20px;
    color: var(--text-light);
  }

  .spinner {
    width: 36px;
    height: 36px;
    border: 4px solid var(--border);
    border-top-color: var(--primary);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto 14px;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-state p { font-size: 14px; font-weight: 600; }

  .submit-btn:disabled {
    opacity: 0.6;
    cursor: not-allowed;
  }

  /* ─── Confirmation Modal ─── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(61,43,36,0.4);
    z-index: 200;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(2px);
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 30px 32px;
    max-width: 380px;
    width: 90%;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    text-align: center;
  }

  .modal-icon {
    width: 48px;
    height: 48px;
    margin: 0 auto 14px;
    background: #FFF0F0;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal-icon svg { width: 24px; height: 24px; color: #D46A6A; }

  .modal h3 { font-size: 17px; font-weight: 800; margin-bottom: 6px; }

  .modal p {
    font-size: 14px;
    color: var(--text-light);
    margin-bottom: 22px;
    line-height: 1.5;
  }

  .modal-actions { display: flex; gap: 10px; justify-content: center; }

  .modal-btn {
    padding: 10px 26px;
    border-radius: var(--radius-sm);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: 2px solid var(--border);
    background: var(--bg-card);
    color: var(--text);
    transition: all 0.2s;
  }

  .modal-btn:hover { border-color: var(--text-light); }

  .modal-btn.danger {
    background: #D46A6A;
    color: #fff;
    border-color: #D46A6A;
  }

  .modal-btn.danger:hover { background: #B85050; border-color: #B85050; }

  /* ─── Toast ─── */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--header-bg);
    color: var(--header-text);
    padding: 12px 28px;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 700;
    box-shadow: 0 4px 20px rgba(0,0,0,0.22);
    z-index: 300;
    transition: transform 0.3s ease;
    pointer-events: none;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ─── Responsive ─── */
  @media (max-width: 820px) {
    .library-layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .form-row { grid-template-columns: 1fr; }
    .header { padding: 0 16px; gap: 10px; }
    .header-title { font-size: 12px; }
    .app-container { padding: 20px 14px 40px; }
    .form-card { padding: 24px 20px; }
    .cat-row { flex-direction: column; align-items: stretch; }
    .new-cat-btn { align-self: flex-start; }
    .filters-row { flex-direction: column; align-items: stretch; }
    .filter-select { min-width: unset; }
  }
</style>
</head>
<body>

<!-- ─── Header ─── -->
<header class="header">
  <div class="header-logo">
    <!-- Cute Panda Icon -->
    <svg class="panda-icon" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="60" cy="60" r="56" fill="#E8A88C" opacity="0.35"/>
      <circle cx="60" cy="60" r="44" fill="#F5D5C8" opacity="0.4"/>
      <!-- Ears -->
      <circle cx="36" cy="34" r="14" fill="#2D2D2D"/>
      <circle cx="84" cy="34" r="14" fill="#2D2D2D"/>
      <circle cx="36" cy="34" r="8" fill="#4A4A4A"/>
      <circle cx="84" cy="34" r="8" fill="#4A4A4A"/>
      <!-- Head -->
      <ellipse cx="60" cy="62" rx="32" ry="30" fill="#FFFFFF"/>
      <!-- Eye patches -->
      <ellipse cx="45" cy="56" rx="12" ry="10" fill="#2D2D2D" transform="rotate(-10 45 56)"/>
      <ellipse cx="75" cy="56" rx="12" ry="10" fill="#2D2D2D" transform="rotate(10 75 56)"/>
      <!-- Eyes -->
      <circle cx="45" cy="56" r="5" fill="#FFFFFF"/>
      <circle cx="75" cy="56" r="5" fill="#FFFFFF"/>
      <circle cx="46" cy="55" r="3" fill="#2D2D2D"/>
      <circle cx="76" cy="55" r="3" fill="#2D2D2D"/>
      <circle cx="47" cy="54" r="1.2" fill="#FFFFFF"/>
      <circle cx="77" cy="54" r="1.2" fill="#FFFFFF"/>
      <!-- Nose -->
      <ellipse cx="60" cy="66" rx="4" ry="3" fill="#2D2D2D"/>
      <!-- Mouth -->
      <path d="M55 70 Q60 75 65 70" stroke="#2D2D2D" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- Blush -->
      <ellipse cx="38" cy="68" rx="6" ry="4" fill="#F5A0A0" opacity="0.4"/>

<script>
(function() {
  /* ─── Google Sheets API ─── */
  const API_URL = 'https://script.google.com/a/macros/refugepoint.org/s/AKfycbx-7ur9KAhQmNJk_H3VmEhHKua_AtCdn8rzyeB4sirkKv30xXIPT3u5EX-GeOTC5ZryAg/exec';
  const DEFAULT_CATS = ['Qualification', 'Cultivation', 'Solicitation'];

  const CAT_COLORS = [
    '#D4856A', '#7CB884', '#6E9FD4', '#C07EC0', '#D4B86A',
    '#5BBCAD', '#D46A9F', '#7E8BD4', '#D49F6A', '#6AC4C4'
  ];

  /* ─── In-memory cache (refreshed from Google Sheets) ─── */
  let cachedEmails = [];
  let cachedCategories = [...DEFAULT_CATS];

  /* ─── Encouraging Messages ─── */
  const ENCOURAGEMENTS = [
    "You've got this! Every email makes a difference.",
    "You're a rockstar! Keep up the amazing work.",
    "The team is lucky to have you! Keep shining.",
    "One email at a time — you're changing lives!",
    "Your words matter. Keep being incredible!",
    "Look at you go! Fundraising superstar!",
    "You're making the world a better place, one email at a time.",
    "Keep going — great things are happening!",
    "Your dedication is truly inspiring!",
    "Every connection counts. You're doing beautifully!",
    "Teamwork makes the dream work — and you're a dream teammate!",
    "You bring so much heart to this work. Never forget that!"
  ];

  const SAVE_ENCOURAGEMENTS = [
    "Email saved! You're on fire!",
    "Saved! The team will love this one.",
    "Nice work! Another great email in the library.",
    "Boom! Saved and ready to go!",
    "Added! You're building something amazing.",
    "Saved! Your team thanks you!"
  ];

  const BANNER_MESSAGES = [
    "Welcome back, superstar! Ready to write some great emails?",
    "You're making a difference every single day!",
    "The library is growing thanks to amazing people like you!",
    "Hey there, rockstar! Let's find the perfect email.",
    "Your team appreciates everything you do!",
    "Another day, another chance to make an impact!"
  ];

  function randomFrom(arr) { return arr[Math.floor(Math.random() * arr.length)]; }

  /* ─── API Helpers ─── */
  async function apiGet(action) {
    try {
      const res = await fetch(API_URL + '?action=' + action);
      const data = await res.json();
      return data;
    } catch(e) {
      console.error('API GET error:', e);
      return { status: 'error', data: [] };
    }
  }

  async function apiPost(body) {
    try {
      const res = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'text/plain' },
        body: JSON.stringify(body)
      });
      const data = await res.json();
      return data;
    } catch(e) {
      console.error('API POST error:', e);
      return { status: 'error' };
    }
  }

  async function fetchEmails() {
    const res = await apiGet('getEmails');
    if (res.status === 'success') {
      cachedEmails = res.data.map(r => ({
        id: String(r.id || ''),
        title: String(r.title || ''),
        author: String(r.author || ''),
        subject: String(r.subject || ''),
        category: String(r.category || ''),
        content: String(r.content || ''),
        date: String(r.date || '')
      })).reverse();
    }
    return cachedEmails;
  }

  async function fetchCategories() {
    const res = await apiGet('getCategories');
    if (res.status === 'success' && res.data.length) {
      cachedCategories = res.data.map(c => String(c));
    }
    return cachedCategories;
  }

  function catColor(cat) {
    const i = cachedCategories.indexOf(cat);
    return CAT_COLORS[(i >= 0 ? i : 0) % CAT_COLORS.length];
  }

  function fmtDate(iso) {
    try {
      const d = new Date(iso);
      if (isNaN(d)) return iso;
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
    } catch(e) { return iso; }
  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  /* ─── Date Filter Helper ─── */
  function matchesDateFilter(isoDate, filter) {
    if (!filter) return true;
    const d = new Date(isoDate);
    if (isNaN(d)) return true;
    const now = new Date();
    const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    const emailDay = new Date(d.getFullYear(), d.getMonth(), d.getDate());

    if (filter === 'today') return emailDay.getTime() === today.getTime();
    if (filter === 'week') {
      const weekAgo = new Date(today); weekAgo.setDate(weekAgo.getDate() - 7);
      return emailDay >= weekAgo;
    }
    if (filter === 'month') {
      const monthAgo = new Date(today); monthAgo.setMonth(monthAgo.getMonth() - 1);
      return emailDay >= monthAgo;
    }
    if (filter === 'older') {
      const monthAgo = new Date(today); monthAgo.setMonth(monthAgo.getMonth() - 1);
      return emailDay < monthAgo;
    }
    return true;
  }

  /* ─── State ─── */
  let activeFilter = null;
  let pendingDeleteId = null;
  let isLoading = false;

  /* ─── DOM Refs ─── */
  const $ = s => document.querySelector(s);
  const $$ = s => document.querySelectorAll(s);

  /* ─── Set encouragement messages ─── */
  $('#libraryBanner').textContent = randomFrom(BANNER_MESSAGES);
  $('#sidebarMotivation').textContent = randomFrom(ENCOURAGEMENTS);
  $('#formEncourage').textContent = randomFrom([
    "You're doing amazing — let's save this for the team!",
    "Another great email incoming! You've got this!",
    "Your contributions make a real impact. Let's add another!",
    "The team will thank you for this one!"
  ]);

  /* ─── Tabs ─── */
  $$('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      $$('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      $$('.view').forEach(v => v.classList.remove('active'));
      $('#view-' + btn.dataset.tab).classList.add('active');
      if (btn.dataset.tab === 'library') {
        $('#libraryBanner').textContent = randomFrom(BANNER_MESSAGES);
        $('#sidebarMotivation').textContent = randomFrom(ENCOURAGEMENTS);
        loadAndRender();
      }
      if (btn.dataset.tab === 'add') {
        populateCatSelect();
        $('#formEncourage').textContent = randomFrom([
          "You're doing amazing — let's save this for the team!",
          "Another great email incoming! You've got this!",
          "Your contributions make a real impact. Let's add another!",
          "The team will thank you for this one!"
        ]);
      }
    });
  });

  /* ─── Toast ─── */
  function toast(msg) {
    const el = $('#toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2600);
  }

  /* ─── Loading indicator ─── */
  function showLoading() {
    const grid = $('#emailsGrid');
    grid.innerHTML = '<div class="loading-state"><div class="spinner"></div><p>Loading emails...</p></div>';
  }

  /* ─── Category Select ─── */
  function populateCatSelect() {
    const sel = $('#formCategory');
    const prev = sel.value;
    sel.innerHTML = '<option value="">Select a category...</option>';
    cachedCategories.forEach(c => {
      const o = document.createElement('option');
      o.value = c; o.textContent = c;
      sel.appendChild(o);
    });
    if (prev && cachedCategories.includes(prev)) sel.value = prev;
  }

  /* ─── Author Filter Populate ─── */
  function populateAuthorFilter() {
    const sel = $('#authorFilter');
    const prev = sel.value;
    const authors = [...new Set(cachedEmails.map(e => e.author).filter(Boolean))].sort();
    sel.innerHTML = '<option value="">All Authors</option>';
    authors.forEach(a => {
      const o = document.createElement('option');
      o.value = a; o.textContent = a;
      sel.appendChild(o);
    });
    if (prev) sel.value = prev;
  }

  /* ─── New Category Inline ─── */
  $('#newCatToggle').addEventListener('click', () => {
    $('#newCatInline').classList.add('show');
    $('#newCatInput').focus();
  });

  $('#newCatCancel').addEventListener('click', () => {
    $('#newCatInline').classList.remove('show');
    $('#newCatInput').value = '';
  });

  async function addNewCategory() {
    const name = $('#newCatInput').value.trim();
    if (!name) return;
    if (cachedCategories.some(c => c.toLowerCase() === name.toLowerCase())) {
      toast('Category already exists');
      return;
    }
    // Add to sheet
    await apiPost({ action: 'addCategory', name });
    cachedCategories.push(name);
    populateCatSelect();
    $('#formCategory').value = name;
    $('#newCatInline').classList.remove('show');
    $('#newCatInput').value = '';
    toast('Category added! Nice one!');
  }

  $('#newCatAdd').addEventListener('click', addNewCategory);
  $('#newCatInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); addNewCategory(); }
    if (e.key === 'Escape') $('#newCatCancel').click();
  });

  /* ─── Dropzone ─── */
  const dropzone = $('#dropzone');
  const textarea = $('#formContent');
  const hint = $('#dropzoneHint');

  function updateHint() { hint.classList.toggle('hidden', textarea.value.length > 0); }

  textarea.addEventListener('input', updateHint);
  textarea.addEventListener('focus', () => hint.classList.add('hidden'));
  textarea.addEventListener('blur', () => { if (!textarea.value) hint.classList.remove('hidden'); });

  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('drag-over');
    const text = e.dataTransfer.getData('text/plain');
    if (text) { textarea.value = text; updateHint(); }
  });

  /* ─── Form Submit ─── */
  $('#emailForm').addEventListener('submit', async e => {
    e.preventDefault();
    const title = $('#formTitle').value.trim();
    const author = $('#formAuthor').value.trim();
    const subject = $('#formSubject').value.trim();
    const category = $('#formCategory').value;
    const content = textarea.value.trim();

    if (!title || !category || !content) return;

    const submitBtn = $('.submit-btn');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Saving...';

    const emailData = { id: uid(), title, author, subject, category, content, date: new Date().toISOString() };

    try {
      await apiPost({ action: 'addEmail', data: emailData });
      cachedEmails.unshift(emailData);

      // Reset form
      $('#formTitle').value = '';
      $('#formAuthor').value = '';
      $('#formSubject').value = '';
      $('#formCategory').value = '';
      textarea.value = '';
      updateHint();
      toast(randomFrom(SAVE_ENCOURAGEMENTS));

      // Switch to library
      $$('.tab-btn').forEach(b => b.classList.remove('active'));
      $$('.tab-btn')[0].classList.add('active');
      $$('.view').forEach(v => v.classList.remove('active'));
      $('#view-library').classList.add('active');
      $('#libraryBanner').textContent = randomFrom(BANNER_MESSAGES);
      $('#sidebarMotivation').textContent = randomFrom(ENCOURAGEMENTS);
      renderLibrary();
    } catch(err) {
      toast('Error saving — please try again');
    }

    submitBtn.disabled = false;
    submitBtn.textContent = 'Save Email';
  });

  /* ─── Clear Filters ─── */
  $('#clearFilters').addEventListener('click', () => {
    activeFilter = null;
    $('#authorFilter').value = '';
    $('#dateFilter').value = '';
    $('#searchInput').value = '';
    renderLibrary();
  });

  /* ─── Filter change listeners ─── */
  $('#authorFilter').addEventListener('change', renderLibrary);
  $('#dateFilter').addEventListener('change', renderLibrary);

  /* ─── Update clear button visibility ─── */
  function updateClearBtn() {
    const hasFilters = activeFilter || $('#authorFilter').value || $('#dateFilter').value || $('#searchInput').value.trim();
    $('#clearFilters').style.display = hasFilters ? 'inline-block' : 'none';
    $('#authorFilter').classList.toggle('active-filter', !!$('#authorFilter').value);
    $('#dateFilter').classList.toggle('active-filter', !!$('#dateFilter').value);
  }

  /* ─── Load data from Google Sheets, then render ─── */
  async function loadAndRender() {
    if (isLoading) return;
    isLoading = true;
    showLoading();
    await Promise.all([fetchEmails(), fetchCategories()]);
    isLoading = false;
    renderLibrary();
  }

  /* ─── Render Library (uses cached data) ─── */
  function renderLibrary() {
    const emails = cachedEmails;
    const cats = cachedCategories;
    const q = $('#searchInput').value.toLowerCase().trim();
    const authorVal = $('#authorFilter').value;
    const dateVal = $('#dateFilter').value;

    populateAuthorFilter();
    updateClearBtn();

    // Counts
    const counts = {};
    cats.forEach(c => counts[c] = 0);
    emails.forEach(s => { if (counts[s.category] !== undefined) counts[s.category]++; });

    // ─ Filter Chips ─
    const chipsEl = $('#filterChips');
    chipsEl.innerHTML = '';

    function makeChip(label, count, isActive, onClick) {
      const btn = document.createElement('button');
      btn.className = 'chip' + (isActive ? ' active' : '');
      btn.innerHTML = esc(label) + ' <span class="chip-count">' + count + '</span>';
      btn.addEventListener('click', onClick);
      chipsEl.appendChild(btn);
    }

    makeChip('All', emails.length, activeFilter === null, () => { activeFilter = null; renderLibrary(); });
    cats.forEach(c => {
      makeChip(c, counts[c] || 0, activeFilter === c, () => {
        activeFilter = activeFilter === c ? null : c;
        renderLibrary();
      });
    });

    // ─ Sidebar ─
    const sideList = $('#sidebarCats');
    sideList.innerHTML = '';
    cats.forEach((c, i) => {
      const li = document.createElement('li');
      li.className = 'cat-item' + (activeFilter === c ? ' active' : '');
      li.innerHTML = '<span class="cat-dot" style="background:' + CAT_COLORS[i % CAT_COLORS.length] + '"></span>'
        + esc(c) + '<span class="cat-count-side">' + (counts[c] || 0) + '</span>';
      li.addEventListener('click', () => { activeFilter = activeFilter === c ? null : c; renderLibrary(); });
      sideList.appendChild(li);
    });

    // ─ Filter ─
    let filtered = emails;
    if (activeFilter) filtered = filtered.filter(s => s.category === activeFilter);
    if (authorVal) filtered = filtered.filter(s => s.author === authorVal);
    if (dateVal) filtered = filtered.filter(s => matchesDateFilter(s.date, dateVal));
    if (q) filtered = filtered.filter(s =>
      s.title.toLowerCase().includes(q) ||
      s.content.toLowerCase().includes(q) ||
      s.author.toLowerCase().includes(q) ||
      s.category.toLowerCase().includes(q) ||
      (s.subject && s.subject.toLowerCase().includes(q))
    );

    // ─ Render Cards ─
    const grid = $('#emailsGrid');
    grid.innerHTML = '';

    if (!filtered.length) {
      grid.innerHTML = '<div class="empty-state">'
        + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/></svg>'
        + '<p>' + (q || activeFilter || authorVal || dateVal ? 'No emails match your filters.' : 'No emails yet — add one to get started!') + '</p>'
        + '<p class="encourage">' + (q || activeFilter || authorVal || dateVal ? 'Try adjusting your filters — you\'ve got great stuff in here!' : 'You\'ve got this! Click "+ Add Email" to begin.') + '</p>'
        + '</div>';
      return;
    }

    filtered.forEach(s => {
      const isLong = s.content.length > 280;
      const color = catColor(s.category);
      const card = document.createElement('div');
      card.className = 'email-card';
      card.innerHTML =
        '<div class="card-top">'
          + '<span class="card-title">' + esc(s.title) + '</span>'
          + '<span class="card-badge" style="background:' + color + '">' + esc(s.category) + '</span>'
        + '</div>'
        + (s.subject ? '<div class="card-subject"><span>Subject: </span>' + esc(s.subject) + '</div>' : '')
        + (s.author ? '<div class="card-author">By ' + esc(s.author) + '</div>' : '')
        + '<div class="card-text' + (isLong ? ' collapsed' : '') + '" data-id="' + s.id + '">' + esc(s.content) + '</div>'
        + (isLong ? '<button class="show-more-btn" data-id="' + s.id + '">Show more</button>' : '')
        + '<div class="card-footer">'
          + '<span class="card-date">' + fmtDate(s.date) + '</span>'
          + '<div class="card-actions">'
            + '<button class="action-btn copy-btn" data-id="' + s.id + '">'
              + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>'
              + '<span>Copy</span>'
            + '</button>'
            + '<button class="action-btn delete" data-id="' + s.id + '">'
              + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>'
              + '<span>Delete</span>'
            + '</button>'
          + '</div>'
        + '</div>';
      grid.appendChild(card);
    });
  }

  /* ─── Grid Event Delegation ─── */
  $('#emailsGrid').addEventListener('click', e => {
    // Show more / less
    const showBtn = e.target.closest('.show-more-btn');
    if (showBtn) {
      const id = showBtn.dataset.id;
      const textEl = document.querySelector('.card-text[data-id="' + id + '"]');
      const isNowCollapsed = textEl.classList.toggle('collapsed');
      showBtn.textContent = isNowCollapsed ? 'Show more' : 'Show less';
      return;
    }

    // Copy
    const copyBtn = e.target.closest('.copy-btn');
    if (copyBtn) {
      const email = cachedEmails.find(s => s.id === copyBtn.dataset.id);
      if (email) {
        navigator.clipboard.writeText(email.content).then(() => {
          copyBtn.classList.add('copied');
          copyBtn.querySelector('span').textContent = 'Copied!';
          setTimeout(() => {
            copyBtn.classList.remove('copied');
            copyBtn.querySelector('span').textContent = 'Copy';
          }, 1500);
        });
      }
      return;
    }

    // Delete
    const delBtn = e.target.closest('.action-btn.delete');
    if (delBtn) {
      pendingDeleteId = delBtn.dataset.id;
      $('#deleteModal').classList.add('show');
    }
  });

  /* ─── Delete Modal ─── */
  $('#cancelDelete').addEventListener('click', () => {
    $('#deleteModal').classList.remove('show');
    pendingDeleteId = null;
  });

  $('#confirmDelete').addEventListener('click', async () => {
    if (!pendingDeleteId) return;
    const btn = $('#confirmDelete');
    btn.disabled = true;
    btn.textContent = 'Deleting...';

    try {
      await apiPost({ action: 'deleteEmail', id: pendingDeleteId });
      cachedEmails = cachedEmails.filter(s => s.id !== pendingDeleteId);
      toast('Email deleted');
    } catch(e) {
      toast('Error deleting — please try again');
    }

    pendingDeleteId = null;
    btn.disabled = false;
    btn.textContent = 'Delete';
    $('#deleteModal').classList.remove('show');
    renderLibrary();
  });

  $('#deleteModal').addEventListener('click', e => {
    if (e.target === e.currentTarget) {
      $('#deleteModal').classList.remove('show');
      pendingDeleteId = null;
    }
  });

  /* ─── Search ─── */
  $('#searchInput').addEventListener('input', renderLibrary);

  /* ─── Init: Load from Google Sheets ─── */
  loadAndRender();
  populateCatSelect();
})();
</script>
</body>
</html>
