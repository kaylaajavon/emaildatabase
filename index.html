<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Individual Giving Team Email Database</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #FDF0EC;
    --bg-card: #FFFFFF;
    --primary: #D4856A;
    --primary-dark: #B8654A;
    --primary-light: #F5D5C8;
    --accent: #E8A88C;
    --header-bg: #3D2B24;
    --header-text: #F5D5C8;
    --text: #3D2B24;
    --text-light: #8B6F66;
    --border: #E8D5CE;
    --shadow: 0 2px 12px rgba(61,43,36,0.08);
    --shadow-hover: 0 4px 20px rgba(61,43,36,0.14);
    --radius: 16px;
    --radius-sm: 10px;
  }

  body {
    font-family: 'Nunito', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
  }

  /* ─── Header ─── */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--header-bg);
    padding: 0 28px;
    display: flex;
    align-items: center;
    gap: 20px;
    height: 66px;
    box-shadow: 0 2px 16px rgba(0,0,0,0.18);
  }

  .header-logo {
    display: flex;
    align-items: center;
    gap: 12px;
    flex-shrink: 0;
  }

  .croissant-icon {
    width: 42px;
    height: 42px;
    position: relative;
  }

  .header-title {
    font-size: 14px;
    font-weight: 800;
    color: var(--header-text);
    letter-spacing: 0.2px;
    line-height: 1.25;
  }

  .header-tabs {
    display: flex;
    gap: 4px;
    margin-left: auto;
  }

  .tab-btn {
    background: transparent;
    border: none;
    color: rgba(245,213,200,0.5);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 700;
    padding: 8px 22px;
    border-radius: 10px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .tab-btn:hover { color: var(--header-text); background: rgba(245,213,200,0.08); }

  .tab-btn.active {
    color: var(--header-bg);
    background: var(--header-text);
  }

  /* ─── Layout ─── */
  .app-container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 28px 24px 60px;
  }

  .view { display: none; }
  .view.active { display: block; }

  /* ─── Library Layout ─── */
  .library-layout {
    display: grid;
    grid-template-columns: 1fr 250px;
    gap: 28px;
    align-items: start;
  }

  /* ─── Search Bar ─── */
  .search-wrap {
    position: relative;
    margin-bottom: 18px;
  }

  .search-wrap svg {
    position: absolute;
    left: 16px;
    top: 50%;
    transform: translateY(-50%);
    width: 18px;
    height: 18px;
    color: var(--text-light);
  }

  .search-input {
    width: 100%;
    padding: 12px 16px 12px 46px;
    border: 2px solid var(--border);
    border-radius: var(--radius);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    background: var(--bg-card);
    color: var(--text);
    transition: border-color 0.2s;
    outline: none;
  }

  .search-input:focus { border-color: var(--primary); }
  .search-input::placeholder { color: #C2A89E; }

  /* ─── Filter Chips ─── */
  .filter-chips {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 20px;
  }

  .chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 7px 16px;
    border-radius: 20px;
    font-size: 13px;
    font-weight: 700;
    border: 2px solid var(--border);
    background: var(--bg-card);
    color: var(--text);
    cursor: pointer;
    transition: all 0.2s;
  }

  .chip:hover { border-color: var(--primary); }

  .chip.active {
    background: var(--primary);
    color: #fff;
    border-color: var(--primary);
  }

  .chip-count {
    background: rgba(61,43,36,0.08);
    color: var(--text-light);
    font-size: 11px;
    font-weight: 800;
    padding: 1px 7px;
    border-radius: 10px;
    min-width: 20px;
    text-align: center;
  }

  .chip.active .chip-count {
    background: rgba(255,255,255,0.25);
    color: #fff;
  }

  /* ─── Snippet Cards ─── */
  .snippets-grid {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .snippet-card {
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 22px 24px;
    box-shadow: var(--shadow);
    transition: box-shadow 0.25s, border-color 0.25s;
    border: 2px solid transparent;
  }

  .snippet-card:hover {
    box-shadow: var(--shadow-hover);
    border-color: var(--primary-light);
  }

  .card-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    margin-bottom: 4px;
  }

  .card-title {
    font-size: 17px;
    font-weight: 800;
    color: var(--text);
    line-height: 1.3;
  }

  .card-badge {
    display: inline-block;
    padding: 3px 12px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 800;
    color: #fff;
    white-space: nowrap;
    flex-shrink: 0;
    letter-spacing: 0.3px;
  }

  .card-author {
    font-size: 13px;
    color: var(--text-light);
    font-weight: 600;
    margin-bottom: 10px;
    font-style: italic;
  }

  .card-text {
    font-size: 14px;
    line-height: 1.7;
    color: var(--text);
    white-space: pre-wrap;
    word-break: break-word;
  }

  .card-text.collapsed {
    display: -webkit-box;
    -webkit-line-clamp: 4;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .show-more-btn {
    background: none;
    border: none;
    color: var(--primary);
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    padding: 4px 0;
    margin-top: 2px;
  }

  .show-more-btn:hover { text-decoration: underline; }

  .card-footer {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-top: 14px;
    padding-top: 12px;
    border-top: 1.5px solid #F2E6E0;
  }

  .card-date {
    font-size: 12px;
    color: var(--text-light);
    font-weight: 600;
  }

  .card-actions { display: flex; gap: 6px; }

  .action-btn {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 6px 14px;
    border-radius: var(--radius-sm);
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 700;
    border: 1.5px solid var(--border);
    background: var(--bg-card);
    color: var(--text-light);
    cursor: pointer;
    transition: all 0.2s;
  }

  .action-btn:hover { border-color: var(--primary); color: var(--primary); }

  .action-btn.delete:hover {
    border-color: #D46A6A;
    color: #D46A6A;
    background: #FFF0F0;
  }

  .action-btn svg { width: 14px; height: 14px; }

  .action-btn.copied {
    border-color: #7CB884;
    color: #5A9A64;
    background: #F0F8EE;
  }

  /* ─── Sidebar ─── */
  .sidebar { position: sticky; top: 94px; }

  .sidebar-card {
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 22px;
    box-shadow: var(--shadow);
  }

  .sidebar-title {
    font-size: 13px;
    font-weight: 800;
    color: var(--text-light);
    text-transform: uppercase;
    letter-spacing: 0.8px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 7px;
  }

  .sidebar-title svg { width: 15px; height: 15px; color: var(--primary); }

  .cat-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .cat-item {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 9px 12px;
    border-radius: var(--radius-sm);
    font-size: 13px;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.15s;
    color: var(--text);
  }

  .cat-item:hover { background: var(--primary-light); }
  .cat-item.active { background: var(--primary-light); color: var(--primary-dark); }

  .cat-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .cat-count-side {
    margin-left: auto;
    font-size: 11px;
    font-weight: 800;
    color: var(--text-light);
    background: var(--bg);
    padding: 2px 8px;
    border-radius: 10px;
  }

  /* ─── Add Snippet View ─── */
  .add-snippet-layout {
    max-width: 660px;
    margin: 0 auto;
  }

  .form-card {
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 36px 36px 32px;
    box-shadow: var(--shadow);
  }

  .form-hero {
    text-align: center;
    margin-bottom: 6px;
  }

  .form-hero .croissant-icon { width: 80px; height: 80px; margin: 0 auto; }

  .form-title {
    font-size: 24px;
    font-weight: 900;
    text-align: center;
    margin-bottom: 2px;
  }

  .form-subtitle {
    font-size: 14px;
    color: var(--text-light);
    text-align: center;
    margin-bottom: 28px;
  }

  .form-group { margin-bottom: 18px; }

  .form-label {
    display: block;
    font-size: 13px;
    font-weight: 800;
    margin-bottom: 6px;
    color: var(--text);
  }

  .form-label .req { color: var(--primary); }

  .form-input, .form-select {
    width: 100%;
    padding: 11px 14px;
    border: 2px solid var(--border);
    border-radius: var(--radius-sm);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    color: var(--text);
    background: #fff;
    outline: none;
    transition: border-color 0.2s;
  }

  .form-input:focus, .form-select:focus { border-color: var(--primary); }
  .form-input::placeholder { color: #C2A89E; }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }

  .cat-row {
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }

  .cat-row .form-group { flex: 1; margin-bottom: 0; }

  .new-cat-btn {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 11px 16px;
    border-radius: var(--radius-sm);
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    border: 2px dashed var(--primary);
    background: transparent;
    color: var(--primary);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .new-cat-btn:hover { background: var(--primary-light); }

  .new-cat-inline {
    display: none;
    gap: 8px;
    align-items: center;
    margin-top: 10px;
  }

  .new-cat-inline.show { display: flex; }
  .new-cat-inline .form-input { flex: 1; }

  .inline-btn {
    padding: 11px 18px;
    border-radius: var(--radius-sm);
    font-family: 'Nunito', sans-serif;
    font-size: 13px;
    font-weight: 700;
    border: none;
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .inline-btn.confirm { background: var(--primary); color: #fff; }
  .inline-btn.confirm:hover { background: var(--primary-dark); }

  .inline-btn.cancel {
    background: var(--bg-card);
    color: var(--text-light);
    border: 2px solid var(--border);
  }

  .inline-btn.cancel:hover { border-color: var(--text-light); }

  /* ─── Drop Zone ─── */
  .dropzone {
    position: relative;
    border: 2px dashed var(--border);
    border-radius: var(--radius-sm);
    min-height: 200px;
    transition: all 0.2s;
    background: #FDFAF9;
  }

  .dropzone.drag-over {
    border-color: var(--primary);
    background: var(--primary-light);
  }

  .dropzone-textarea {
    width: 100%;
    min-height: 200px;
    padding: 16px;
    border: none;
    border-radius: var(--radius-sm);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    line-height: 1.65;
    color: var(--text);
    background: transparent;
    resize: vertical;
    outline: none;
  }

  .dropzone-hint {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
    pointer-events: none;
    color: #C2A89E;
    font-size: 13px;
    font-weight: 600;
    transition: opacity 0.2s;
  }

  .dropzone-hint svg {
    display: block;
    margin: 0 auto 8px;
    width: 36px;
    height: 36px;
    color: var(--accent);
  }

  .dropzone-hint.hidden { opacity: 0; }

  .submit-btn {
    width: 100%;
    padding: 14px;
    border: none;
    border-radius: var(--radius);
    font-family: 'Nunito', sans-serif;
    font-size: 16px;
    font-weight: 800;
    background: var(--primary);
    color: #fff;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    margin-top: 10px;
  }

  .submit-btn:hover { background: var(--primary-dark); }
  .submit-btn:active { transform: scale(0.99); }

  /* ─── Empty State ─── */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-light);
  }

  .empty-state svg { width: 56px; height: 56px; margin-bottom: 14px; color: var(--accent); }
  .empty-state p { font-size: 15px; font-weight: 600; }

  /* ─── Confirmation Modal ─── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(61,43,36,0.4);
    z-index: 200;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(2px);
  }

  .modal-overlay.show { display: flex; }

  .modal {
    background: var(--bg-card);
    border-radius: var(--radius);
    padding: 30px 32px;
    max-width: 380px;
    width: 90%;
    box-shadow: 0 8px 40px rgba(0,0,0,0.18);
    text-align: center;
  }

  .modal-icon {
    width: 48px;
    height: 48px;
    margin: 0 auto 14px;
    background: #FFF0F0;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal-icon svg { width: 24px; height: 24px; color: #D46A6A; }

  .modal h3 { font-size: 17px; font-weight: 800; margin-bottom: 6px; }

  .modal p {
    font-size: 14px;
    color: var(--text-light);
    margin-bottom: 22px;
    line-height: 1.5;
  }

  .modal-actions { display: flex; gap: 10px; justify-content: center; }

  .modal-btn {
    padding: 10px 26px;
    border-radius: var(--radius-sm);
    font-family: 'Nunito', sans-serif;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    border: 2px solid var(--border);
    background: var(--bg-card);
    color: var(--text);
    transition: all 0.2s;
  }

  .modal-btn:hover { border-color: var(--text-light); }

  .modal-btn.danger {
    background: #D46A6A;
    color: #fff;
    border-color: #D46A6A;
  }

  .modal-btn.danger:hover { background: #B85050; border-color: #B85050; }

  /* ─── Toast ─── */
  .toast {
    position: fixed;
    bottom: 28px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--header-bg);
    color: var(--header-text);
    padding: 12px 28px;
    border-radius: var(--radius);
    font-size: 14px;
    font-weight: 700;
    box-shadow: 0 4px 20px rgba(0,0,0,0.22);
    z-index: 300;
    transition: transform 0.3s ease;
    pointer-events: none;
  }

  .toast.show { transform: translateX(-50%) translateY(0); }

  /* ─── Responsive ─── */
  @media (max-width: 820px) {
    .library-layout { grid-template-columns: 1fr; }
    .sidebar { display: none; }
    .form-row { grid-template-columns: 1fr; }
    .header { padding: 0 16px; gap: 10px; }
    .header-title { font-size: 12px; }
    .app-container { padding: 20px 14px 40px; }
    .form-card { padding: 24px 20px; }
    .cat-row { flex-direction: column; align-items: stretch; }
    .new-cat-btn { align-self: flex-start; }
  }
</style>
</head>
<body>

<!-- ─── Header ─── -->
<header class="header">
  <div class="header-logo">
    <!-- Cute Croissant Icon with face -->
    <svg class="croissant-icon" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
      <circle cx="60" cy="60" r="56" fill="#E8A88C" opacity="0.35"/>
      <circle cx="60" cy="60" r="44" fill="#F5D5C8" opacity="0.4"/>
      <!-- Croissant body -->
      <path d="M30 68C28 55 35 42 48 36C42 42 40 52 44 60C47 66 53 70 60 70C67 70 73 66 76 60C80 52 78 42 72 36C85 42 92 55 90 68C88 82 76 92 62 94C48 94 34 82 30 68Z" fill="#D4856A"/>
      <!-- Croissant ridges -->
      <path d="M48 36C44 44 44 54 50 62C52 52 50 42 48 36Z" fill="#C07558" opacity="0.4"/>
      <path d="M60 34C58 44 58 56 62 64C64 54 62 42 60 34Z" fill="#C07558" opacity="0.35"/>
      <path d="M72 36C76 44 76 54 70 62C68 52 70 42 72 36Z" fill="#C07558" opacity="0.4"/>
      <!-- Light highlight -->
      <path d="M38 60C36 52 40 44 48 40C44 48 44 56 48 64C42 64 38 62 38 60Z" fill="#F5D5C8" opacity="0.5"/>
      <!-- Cute face -->
      <circle cx="50" cy="62" r="3.2" fill="#3D2B24"/>
      <circle cx="70" cy="62" r="3.2" fill="#3D2B24"/>
      <circle cx="51.2" cy="60.8" r="1.2" fill="#fff"/>
      <circle cx="71.2" cy="60.8" r="1.2" fill="#fff"/>
      <!-- Smile -->
      <path d="M55 70 Q60 75 65 70" stroke="#3D2B24" stroke-width="2.2" fill="none" stroke-linecap="round"/>
      <!-- Blush -->
      <ellipse cx="42" cy="67" rx="5" ry="3.5" fill="#F5A0A0" opacity="0.35"/>
      <ellipse cx="78" cy="67" rx="5" ry="3.5" fill="#F5A0A0" opacity="0.35"/>
    </svg>
    <span class="header-title">Individual Giving Team<br>Email Database</span>
  </div>
  <nav class="header-tabs">
    <button class="tab-btn active" data-tab="library">Library</button>
    <button class="tab-btn" data-tab="add">+ Add Snippet</button>
  </nav>
</header>

<!-- ─── Main Content ─── -->
<div class="app-container">

  <!-- ═══ LIBRARY VIEW ═══ -->
  <div id="view-library" class="view active">
    <div class="library-layout">
      <div class="library-main">
        <!-- Search -->
        <div class="search-wrap">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="searchInput" class="search-input" placeholder="Search by title, text, author, or category...">
        </div>
        <!-- Filter Chips -->
        <div id="filterChips" class="filter-chips"></div>
        <!-- Cards -->
        <div id="snippetsGrid" class="snippets-grid"></div>
      </div>

      <!-- Sidebar -->
      <aside class="sidebar">
        <div class="sidebar-card">
          <div class="sidebar-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 7h16M4 12h10M4 17h6"/></svg>
            Categories
          </div>
          <ul id="sidebarCats" class="cat-list"></ul>
        </div>
      </aside>
    </div>
  </div>

  <!-- ═══ ADD SNIPPET VIEW ═══ -->
  <div id="view-add" class="view">
    <div class="add-snippet-layout">
      <div class="form-card">
        <div class="form-hero">
          <svg class="croissant-icon" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg" style="width:80px;height:80px">
            <circle cx="60" cy="60" r="56" fill="#E8A88C" opacity="0.35"/>
            <circle cx="60" cy="60" r="44" fill="#F5D5C8" opacity="0.4"/>
            <path d="M30 68C28 55 35 42 48 36C42 42 40 52 44 60C47 66 53 70 60 70C67 70 73 66 76 60C80 52 78 42 72 36C85 42 92 55 90 68C88 82 76 92 62 94C48 94 34 82 30 68Z" fill="#D4856A"/>
            <path d="M48 36C44 44 44 54 50 62C52 52 50 42 48 36Z" fill="#C07558" opacity="0.4"/>
            <path d="M60 34C58 44 58 56 62 64C64 54 62 42 60 34Z" fill="#C07558" opacity="0.35"/>
            <path d="M72 36C76 44 76 54 70 62C68 52 70 42 72 36Z" fill="#C07558" opacity="0.4"/>
            <path d="M38 60C36 52 40 44 48 40C44 48 44 56 48 64C42 64 38 62 38 60Z" fill="#F5D5C8" opacity="0.5"/>
            <circle cx="50" cy="62" r="3.2" fill="#3D2B24"/>
            <circle cx="70" cy="62" r="3.2" fill="#3D2B24"/>
            <circle cx="51.2" cy="60.8" r="1.2" fill="#fff"/>
            <circle cx="71.2" cy="60.8" r="1.2" fill="#fff"/>
            <path d="M55 70 Q60 75 65 70" stroke="#3D2B24" stroke-width="2.2" fill="none" stroke-linecap="round"/>
            <ellipse cx="42" cy="67" rx="5" ry="3.5" fill="#F5A0A0" opacity="0.35"/>
            <ellipse cx="78" cy="67" rx="5" ry="3.5" fill="#F5A0A0" opacity="0.35"/>
          </svg>
        </div>
        <h2 class="form-title">Add New Snippet</h2>
        <p class="form-subtitle">Save an email snippet for the team to reference</p>

        <form id="snippetForm">
          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Title <span class="req">*</span></label>
              <input type="text" id="formTitle" class="form-input" placeholder="e.g. Thank You Follow-Up" required>
            </div>
            <div class="form-group">
              <label class="form-label">Author</label>
              <input type="text" id="formAuthor" class="form-input" placeholder="e.g. Jane Smith">
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Category <span class="req">*</span></label>
            <div class="cat-row">
              <div class="form-group">
                <select id="formCategory" class="form-select" required>
                  <option value="">Select a category...</option>
                </select>
              </div>
              <button type="button" id="newCatToggle" class="new-cat-btn">+ New Category</button>
            </div>
            <div id="newCatInline" class="new-cat-inline">
              <input type="text" id="newCatInput" class="form-input" placeholder="New category name...">
              <button type="button" id="newCatAdd" class="inline-btn confirm">Add</button>
              <button type="button" id="newCatCancel" class="inline-btn cancel">Cancel</button>
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">Snippet Content <span class="req">*</span></label>
            <div class="dropzone" id="dropzone">
              <textarea id="formContent" class="dropzone-textarea" required></textarea>
              <div id="dropzoneHint" class="dropzone-hint">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
                Paste or drag &amp; drop text here
              </div>
            </div>
          </div>

          <button type="submit" class="submit-btn">Save Snippet</button>
        </form>
      </div>
    </div>
  </div>

</div>

<!-- ─── Delete Confirmation Modal ─── -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <div class="modal-icon">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
    </div>
    <h3>Delete this snippet?</h3>
    <p>This can't be undone. The snippet will be permanently removed from the library.</p>
    <div class="modal-actions">
      <button class="modal-btn" id="cancelDelete">Keep it</button>
      <button class="modal-btn danger" id="confirmDelete">Delete</button>
    </div>
  </div>
</div>

<!-- ─── Toast ─── -->
<div class="toast" id="toast"></div>

<script>
(function() {
  /* ─── Constants ─── */
  const STORAGE_KEY = 'ig_snippets';
  const CAT_KEY = 'ig_categories';
  const DEFAULT_CATS = ['Qualification', 'Cultivation', 'Solicitation'];

  const CAT_COLORS = [
    '#D4856A', '#7CB884', '#6E9FD4', '#C07EC0', '#D4B86A',
    '#5BBCAD', '#D46A9F', '#7E8BD4', '#D49F6A', '#6AC4C4'
  ];

  /* ─── Storage Helpers ─── */
  function loadCategories() {
    try {
      const s = localStorage.getItem(CAT_KEY);
      if (s) return JSON.parse(s);
    } catch(e) {}
    const c = [...DEFAULT_CATS];
    localStorage.setItem(CAT_KEY, JSON.stringify(c));
    return c;
  }

  function saveCategories(c) { localStorage.setItem(CAT_KEY, JSON.stringify(c)); }

  function loadSnippets() {
    try {
      const s = localStorage.getItem(STORAGE_KEY);
      return s ? JSON.parse(s) : [];
    } catch(e) { return []; }
  }

  function saveSnippets(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }

  function catColor(cat) {
    const cats = loadCategories();
    const i = cats.indexOf(cat);
    return CAT_COLORS[(i >= 0 ? i : 0) % CAT_COLORS.length];
  }

  function fmtDate(iso) {
    return new Date(iso).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
  }

  function esc(str) {
    const d = document.createElement('div');
    d.textContent = str;
    return d.innerHTML;
  }

  function uid() {
    return Date.now().toString(36) + Math.random().toString(36).slice(2, 7);
  }

  /* ─── State ─── */
  let activeFilter = null;
  let pendingDeleteId = null;

  /* ─── DOM Refs ─── */
  const $ = s => document.querySelector(s);
  const $$ = s => document.querySelectorAll(s);

  /* ─── Tabs ─── */
  $$('.tab-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      $$('.tab-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      $$('.view').forEach(v => v.classList.remove('active'));
      $('#view-' + btn.dataset.tab).classList.add('active');
      if (btn.dataset.tab === 'library') renderLibrary();
      if (btn.dataset.tab === 'add') populateCatSelect();
    });
  });

  /* ─── Toast ─── */
  function toast(msg) {
    const el = $('#toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 2200);
  }

  /* ─── Category Select ─── */
  function populateCatSelect() {
    const sel = $('#formCategory');
    const prev = sel.value;
    const cats = loadCategories();
    sel.innerHTML = '<option value="">Select a category...</option>';
    cats.forEach(c => {
      const o = document.createElement('option');
      o.value = c; o.textContent = c;
      sel.appendChild(o);
    });
    if (prev && cats.includes(prev)) sel.value = prev;
  }

  /* ─── New Category Inline ─── */
  $('#newCatToggle').addEventListener('click', () => {
    $('#newCatInline').classList.add('show');
    $('#newCatInput').focus();
  });

  $('#newCatCancel').addEventListener('click', () => {
    $('#newCatInline').classList.remove('show');
    $('#newCatInput').value = '';
  });

  function addNewCategory() {
    const name = $('#newCatInput').value.trim();
    if (!name) return;
    const cats = loadCategories();
    if (cats.some(c => c.toLowerCase() === name.toLowerCase())) {
      toast('Category already exists');
      return;
    }
    cats.push(name);
    saveCategories(cats);
    populateCatSelect();
    $('#formCategory').value = name;
    $('#newCatInline').classList.remove('show');
    $('#newCatInput').value = '';
    toast('Category added!');
  }

  $('#newCatAdd').addEventListener('click', addNewCategory);
  $('#newCatInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') { e.preventDefault(); addNewCategory(); }
    if (e.key === 'Escape') $('#newCatCancel').click();
  });

  /* ─── Dropzone ─── */
  const dropzone = $('#dropzone');
  const textarea = $('#formContent');
  const hint = $('#dropzoneHint');

  function updateHint() { hint.classList.toggle('hidden', textarea.value.length > 0); }

  textarea.addEventListener('input', updateHint);
  textarea.addEventListener('focus', () => hint.classList.add('hidden'));
  textarea.addEventListener('blur', () => { if (!textarea.value) hint.classList.remove('hidden'); });

  dropzone.addEventListener('dragover', e => { e.preventDefault(); dropzone.classList.add('drag-over'); });
  dropzone.addEventListener('dragleave', () => dropzone.classList.remove('drag-over'));
  dropzone.addEventListener('drop', e => {
    e.preventDefault();
    dropzone.classList.remove('drag-over');
    const text = e.dataTransfer.getData('text/plain');
    if (text) { textarea.value = text; updateHint(); }
  });

  /* ─── Form Submit ─── */
  $('#snippetForm').addEventListener('submit', e => {
    e.preventDefault();
    const title = $('#formTitle').value.trim();
    const author = $('#formAuthor').value.trim();
    const category = $('#formCategory').value;
    const content = textarea.value.trim();

    if (!title || !category || !content) return;

    const snippets = loadSnippets();
    snippets.unshift({ id: uid(), title, author, category, content, date: new Date().toISOString() });
    saveSnippets(snippets);

    // Reset form
    $('#formTitle').value = '';
    $('#formAuthor').value = '';
    $('#formCategory').value = '';
    textarea.value = '';
    updateHint();
    toast('Snippet saved!');

    // Switch to library
    $$('.tab-btn').forEach(b => b.classList.remove('active'));
    $$('.tab-btn')[0].classList.add('active');
    $$('.view').forEach(v => v.classList.remove('active'));
    $('#view-library').classList.add('active');
    renderLibrary();
  });

  /* ─── Render Library ─── */
  function renderLibrary() {
    const snippets = loadSnippets();
    const cats = loadCategories();
    const q = $('#searchInput').value.toLowerCase().trim();

    // Counts
    const counts = {};
    cats.forEach(c => counts[c] = 0);
    snippets.forEach(s => { if (counts[s.category] !== undefined) counts[s.category]++; });

    // ─ Filter Chips ─
    const chipsEl = $('#filterChips');
    chipsEl.innerHTML = '';

    function makeChip(label, count, isActive, onClick) {
      const btn = document.createElement('button');
      btn.className = 'chip' + (isActive ? ' active' : '');
      btn.innerHTML = esc(label) + ' <span class="chip-count">' + count + '</span>';
      btn.addEventListener('click', onClick);
      chipsEl.appendChild(btn);
    }

    makeChip('All', snippets.length, activeFilter === null, () => { activeFilter = null; renderLibrary(); });
    cats.forEach(c => {
      makeChip(c, counts[c] || 0, activeFilter === c, () => {
        activeFilter = activeFilter === c ? null : c;
        renderLibrary();
      });
    });

    // ─ Sidebar ─
    const sideList = $('#sidebarCats');
    sideList.innerHTML = '';
    cats.forEach((c, i) => {
      const li = document.createElement('li');
      li.className = 'cat-item' + (activeFilter === c ? ' active' : '');
      li.innerHTML = '<span class="cat-dot" style="background:' + CAT_COLORS[i % CAT_COLORS.length] + '"></span>'
        + esc(c) + '<span class="cat-count-side">' + (counts[c] || 0) + '</span>';
      li.addEventListener('click', () => { activeFilter = activeFilter === c ? null : c; renderLibrary(); });
      sideList.appendChild(li);
    });

    // ─ Filter ─
    let filtered = snippets;
    if (activeFilter) filtered = filtered.filter(s => s.category === activeFilter);
    if (q) filtered = filtered.filter(s =>
      s.title.toLowerCase().includes(q) ||
      s.content.toLowerCase().includes(q) ||
      s.author.toLowerCase().includes(q) ||
      s.category.toLowerCase().includes(q)
    );

    // ─ Render Cards ─
    const grid = $('#snippetsGrid');
    grid.innerHTML = '';

    if (!filtered.length) {
      grid.innerHTML = '<div class="empty-state">'
        + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="9" y1="15" x2="15" y2="15"/></svg>'
        + '<p>' + (q || activeFilter ? 'No snippets match your search.' : 'No snippets yet — add one to get started!') + '</p></div>';
      return;
    }

    filtered.forEach(s => {
      const isLong = s.content.length > 280;
      const color = catColor(s.category);
      const card = document.createElement('div');
      card.className = 'snippet-card';
      card.innerHTML =
        '<div class="card-top">'
          + '<span class="card-title">' + esc(s.title) + '</span>'
          + '<span class="card-badge" style="background:' + color + '">' + esc(s.category) + '</span>'
        + '</div>'
        + (s.author ? '<div class="card-author">By ' + esc(s.author) + '</div>' : '')
        + '<div class="card-text' + (isLong ? ' collapsed' : '') + '" data-id="' + s.id + '">' + esc(s.content) + '</div>'
        + (isLong ? '<button class="show-more-btn" data-id="' + s.id + '">Show more</button>' : '')
        + '<div class="card-footer">'
          + '<span class="card-date">' + fmtDate(s.date) + '</span>'
          + '<div class="card-actions">'
            + '<button class="action-btn copy-btn" data-id="' + s.id + '">'
              + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/></svg>'
              + '<span>Copy</span>'
            + '</button>'
            + '<button class="action-btn delete" data-id="' + s.id + '">'
              + '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>'
              + '<span>Delete</span>'
            + '</button>'
          + '</div>'
        + '</div>';
      grid.appendChild(card);
    });
  }

  /* ─── Grid Event Delegation ─── */
  $('#snippetsGrid').addEventListener('click', e => {
    // Show more / less
    const showBtn = e.target.closest('.show-more-btn');
    if (showBtn) {
      const id = showBtn.dataset.id;
      const textEl = document.querySelector('.card-text[data-id="' + id + '"]');
      const isNowCollapsed = textEl.classList.toggle('collapsed');
      showBtn.textContent = isNowCollapsed ? 'Show more' : 'Show less';
      return;
    }

    // Copy
    const copyBtn = e.target.closest('.copy-btn');
    if (copyBtn) {
      const snippet = loadSnippets().find(s => s.id === copyBtn.dataset.id);
      if (snippet) {
        navigator.clipboard.writeText(snippet.content).then(() => {
          copyBtn.classList.add('copied');
          copyBtn.querySelector('span').textContent = 'Copied!';
          setTimeout(() => {
            copyBtn.classList.remove('copied');
            copyBtn.querySelector('span').textContent = 'Copy';
          }, 1500);
        });
      }
      return;
    }

    // Delete
    const delBtn = e.target.closest('.action-btn.delete');
    if (delBtn) {
      pendingDeleteId = delBtn.dataset.id;
      $('#deleteModal').classList.add('show');
    }
  });

  /* ─── Delete Modal ─── */
  $('#cancelDelete').addEventListener('click', () => {
    $('#deleteModal').classList.remove('show');
    pendingDeleteId = null;
  });

  $('#confirmDelete').addEventListener('click', () => {
    if (!pendingDeleteId) return;
    const snippets = loadSnippets().filter(s => s.id !== pendingDeleteId);
    saveSnippets(snippets);
    pendingDeleteId = null;
    $('#deleteModal').classList.remove('show');
    toast('Snippet deleted');
    renderLibrary();
  });

  $('#deleteModal').addEventListener('click', e => {
    if (e.target === e.currentTarget) {
      $('#deleteModal').classList.remove('show');
      pendingDeleteId = null;
    }
  });

  /* ─── Search ─── */
  $('#searchInput').addEventListener('input', renderLibrary);

  /* ─── Init ─── */
  populateCatSelect();
  renderLibrary();
})();
</script>
</body>
</html>
